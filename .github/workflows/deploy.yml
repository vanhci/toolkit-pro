name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Build resume-optimizer
        run: |
          cd resume-optimizer
          npm install
          npm run build

      - name: Deploy to Cloudflare Pages
        run: |
          cd resume-optimizer
          wrangler pages deploy .next --project-name=toolkit-pro --commit-dirty=true --commit-message "deploy ${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
